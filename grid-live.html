<!DOCTYPE html>
<html>
<body>
<pre id="output">Loading...</pre>

<script>
fetch('https://api.carbonintensity.org.uk/generation')
  .then(response => response.json())
  .then(data => {
    document.getElementById('output').innerText =
      JSON.stringify(data, null, 2);
  });
</script>

</body>
</html>
