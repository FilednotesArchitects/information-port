      - name: Fetch grid data
        run: |
          node <<'EOF'
          const fs = require("fs");

          async function fetchJson(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`${res.status} ${url}`);
            return await res.json();
          }

          async function main() {
            const now = new Date();

            // --- Carbon Intensity generation mix ---
            const ci = await fetchJson("https://api.carbonintensity.org.uk/generation");
            const mix = ci.data.generationmix;

            function fuel(name) {
              const item = mix.find(x => x.fuel === name);
              return item ? item.perc : 0;
            }

            const renewables =
              fuel("wind") +
              fuel("solar") +
              fuel("hydro") +
              fuel("biomass");

            const nuclear = fuel("nuclear");

            const fossil =
              fuel("gas") +
              fuel("coal") +
              fuel("imports") +
              fuel("other");

            // --- Elexon demand ---
            let demandGW = null;

            try {
              const demand = await fetchJson("https://data.elexon.co.uk/bmrs/api/v1/datasets/INDO/stream");
              const rows = Array.isArray(demand.data) ? demand.data : [];

              const latest = rows
                .filter(r => r.demand || r.initialDemandOutturn || r.nationalDemand)
                .at(-1);

              const demandMW =
                latest?.demand ??
                latest?.initialDemandOutturn ??
                latest?.nationalDemand ??
                null;

              if (demandMW !== null) {
                demandGW = Math.round((demandMW / 1000) * 10) / 10;
              }
            } catch (err) {
              console.log("Demand fetch failed:", err.message);
            }

            const updated = now.toLocaleTimeString("en-GB", {
              timeZone: "Europe/London",
              hour: "2-digit",
              minute: "2-digit"
            });

            const current = {
              title: "Grid",
              renewables: Math.round(renewables),
              fossil: Math.round(fossil),
              nuclear: Math.round(nuclear),
              lowcarbon: Math.round(renewables + nuclear),
              demand_gw: demandGW,
              updated
            };

            fs.writeFileSync("grid-current.json", JSON.stringify(current, null, 2));

            // --- CSV for Widgy line chart ---
            const historyPath = "grid-history.csv";
            let rows = [];

            if (fs.existsSync(historyPath)) {
              rows = fs.readFileSync(historyPath, "utf8")
                .trim()
                .split("\n")
                .slice(1)
                .filter(Boolean);
            }

            rows.push([
              now.toISOString(),
              Math.round(renewables),
              Math.round(fossil),
              Math.round(nuclear),
              Math.round(renewables + nuclear),
              demandGW ?? ""
            ].join(","));

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

            rows = rows.filter(row => {
              const timestamp = row.split(",")[0];
              return new Date(timestamp).getTime() >= sevenDaysAgo;
            });

            fs.writeFileSync(
              historyPath,
              "timestamp,renewables,fossil,nuclear,lowcarbon,demand_gw\n" +
              rows.join("\n") +
              "\n"
            );
          }

          main();
          EOF
