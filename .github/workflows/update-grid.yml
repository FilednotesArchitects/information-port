name: Update Grid Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-grid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch grid data
        run: |
          node <<'EOF'
          const fs = require("fs");

          async function fetchJson(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`${res.status} ${url}`);
            return await res.json();
          }

          async function main() {
            const now = new Date();

            const ci = await fetchJson("https://api.carbonintensity.org.uk/generation");
            const mix = ci.data.generationmix;

            function fuel(name) {
              const item = mix.find(x => x.fuel === name);
              return item ? item.perc : 0;
            }

            const renewables = fuel("wind") + fuel("solar") + fuel("hydro") + fuel("biomass");
            const nuclear = fuel("nuclear");
            const fossil = fuel("gas") + fuel("coal") + fuel("imports") + fuel("other");

            let demandGW = null;

            try {let demandGW = null;

try {
  const demand = await fetchJson("https://data.elexon.co.uk/bmrs/api/v1/demand/outturn?format=json");
  const rows = Array.isArray(demand.data) ? demand.data : [];

  const latest = rows.length > 0 ? rows[rows.length - 1] : null;

  const demandMW =
    latest?.initialNationalDemandOutturn ??
    latest?.initialDemandOutturn ??
    latest?.demand ??
    latest?.quantity ??
    latest?.value ??
    null;

  if (demandMW !== null) {
    demandGW = Math.round((demandMW / 1000) * 10) / 10;
  }
} catch (err) {
  console.log("Demand fetch failed:", err.message);
}
            }

            const updated = now.toLocaleTimeString("en-GB", {
              timeZone: "Europe/London",
              hour: "2-digit",
              minute: "2-digit"
            });

            const current = {
              title: "Grid",
              renewables: Math.round(renewables),
              fossil: Math.round(fossil),
              nuclear: Math.round(nuclear),
              lowcarbon: Math.round(renewables + nuclear),
              demand_gw: demandGW,
              updated
            };

            fs.writeFileSync("grid-current.json", JSON.stringify(current, null, 2));

            const historyPath = "grid-history.csv";
            let rows = [];

            if (fs.existsSync(historyPath)) {
              rows = fs.readFileSync(historyPath, "utf8")
                .trim()
                .split("\n")
                .slice(1)
                .filter(Boolean);
            }

            rows.push([
              now.toISOString(),
              Math.round(renewables),
              Math.round(fossil),
              Math.round(nuclear),
              Math.round(renewables + nuclear),
              demandGW ?? ""
            ].join(","));

            const sevenDaysAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

            rows = rows.filter(row => {
              const timestamp = row.split(",")[0];
              return new Date(timestamp).getTime() >= sevenDaysAgo;
            });

            fs.writeFileSync(
              historyPath,
              "timestamp,renewables,fossil,nuclear,lowcarbon,demand_gw\n" +
              rows.join("\n") +
              "\n"
            );
          }

          main();
          EOF

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add grid-current.json grid-history.csv
          git commit -m "Update grid data" || echo "No changes"
          git push
