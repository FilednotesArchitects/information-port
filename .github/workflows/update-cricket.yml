name: Update Cricket Data

on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cricket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch cricket data
        run: |
          node <<'EOF'
          const fs = require("fs");

          async function main() {
            const res = await fetch("https://www.espncricinfo.com/rss/livescores.xml");
            if (!res.ok) throw new Error(`${res.status} Cricinfo RSS failed`);

            const xml = await res.text();

            const items = [...xml.matchAll(/<item>([\s\S]*?)<\/item>/g)].map(m => m[1]);

            function clean(s) {
              return s
                .replace(/<!\[CDATA\[/g, "")
                .replace(/\]\]>/g, "")
                .replace(/&amp;/g, "&")
                .replace(/&#39;/g, "'")
                .replace(/&quot;/g, "\"")
                .replace(/<[^>]*>/g, "")
                .replace(/\s+/g, " ")
                .trim();
            }

            const titles = items.map(item => {
              const title = item.match(/<title>([\s\S]*?)<\/title>/);
              return title ? clean(title[1]) : "";
            }).filter(Boolean);

            const now = new Date();

            const updated = now.toLocaleTimeString("en-GB", {
              timeZone: "Europe/London",
              hour: "2-digit",
              minute: "2-digit"
            });

            function shortTeam(name) {
              if (/england/i.test(name)) return "ENG";
              if (/new zealand/i.test(name)) return "NZL";
              return name.trim();
            }

            function normaliseScore(score) {
              return score
                .replace(/\*/g, "*")
                .replace(/\s+/g, " ")
                .trim();
            }

          function parseScore(raw) {
            const title = raw.trim();

            const parts = title.split(" v ");
            if (parts.length !== 2) return null;

            function parseSide(side) {
            const cleaned = side.trim();

            const m = cleaned.match(/^(.+?)(?:\s+([0-9].*))?$/);
            if (!m) return null;

            return {
            team: shortTeam(m[1]),
            score: m[2] ? normaliseScore(m[2]) : ""
    };
  }

  const a = parseSide(parts[0]);
  const b = parseSide(parts[1]);

  if (!a || !b) return null;

  return { a, b };
}

            function detectInterval(raw) {
              const lower = raw.toLowerCase();

              if (lower.includes("lunch")) return "LUNCH";
              if (lower.includes("tea")) return "TEA";
              if (lower.includes("stumps")) return "STUMPS";
              if (lower.includes("bad light")) return "BAD LIGHT";
              if (lower.includes("rain")) return "RAIN";
              if (lower.includes("delayed")) return "DELAYED";
              if (lower.includes("abandoned")) return "ABANDONED";

              return null;
            }

            function detectResult(raw) {
              const lower = raw.toLowerCase();

              if (
                lower.includes(" won ") ||
                lower.includes("drawn") ||
                lower.includes("draw") ||
                lower.includes("no result") ||
                lower.includes("match tied")
              ) {
                return raw;
              }

              return null;
            }

            const englandMatch =
              titles.find(t =>
                /England/i.test(t) &&
                /New Zealand|NZ/i.test(t)
              ) || null;

            let output;

            if (englandMatch) {
              const interval = detectInterval(englandMatch);
              const result = detectResult(englandMatch);
              const parsed = parseScore(englandMatch);

              if (result) {
                output = {
                  status: "complete",
                  match: "ENG v NZL",
                  headline: "Result",
                  line1: result,
                  line2: "",
                  line3: "",
                  line4: "",
                  raw: englandMatch,
                  updated
                };
              } else if (interval && parsed) {
                output = {
                  status: interval.toLowerCase().replace(" ", "_"),
                  match: "ENG v NZL",
                  headline: interval,
                  line1: `${parsed.a.team} ${parsed.a.score}`,
                  line2: `${parsed.b.team} ${parsed.b.score}`,
                  line3: "",
                  line4: "",
                  raw: englandMatch,
                  updated
                };
              } else if (parsed) {
                output = {
                  status: "live",
                  match: "ENG v NZL",
                  headline: "Cricket",
                  line1: `${parsed.a.team} ${parsed.a.score}`,
                  line2: `${parsed.b.team} ${parsed.b.score}`,
                  line3: "",
                  line4: "",
                  raw: englandMatch,
                  updated
                };
              } else {
                output = {
                  status: "live",
                  match: "ENG v NZL",
                  headline: "Cricket",
                  line1: englandMatch,
                  line2: "",
                  line3: "",
                  line4: "",
                  raw: englandMatch,
                  updated
                };
              }
            } else {
              output = {
                status: "upcoming",
                match: "ENG v NZL",
                headline: "Next ENG match",
                line1: "ENG v NZL",
                line2: "Trent Bridge",
                line3: "26.06.26",
                line4: "11:00",
                raw: "",
                updated
              };
            }

            fs.writeFileSync("cricket-current.json", JSON.stringify(output, null, 2));
          }

          main();
          EOF

      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cricket-current.json
          git commit -m "Update cricket data" || echo "No changes"
          git push
